<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Beside You</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #080b10;
        --background-deep: #04060a;
        --surface: rgba(15, 19, 27, 0.92);
        --border: rgba(228, 195, 145, 0.16);
        --foreground: #f7ecd8;
        --muted: #d7c8b4;
        --accent: #dfb06f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: max(env(safe-area-inset-top), 24px) 20px max(env(safe-area-inset-bottom), 28px);
        font-family: "Manrope", system-ui, sans-serif;
        color: var(--foreground);
        background:
          radial-gradient(circle at top left, rgba(223, 176, 111, 0.18), transparent 28%),
          radial-gradient(circle at 85% 0%, rgba(79, 110, 165, 0.16), transparent 24%),
          linear-gradient(180deg, rgba(8, 11, 16, 0.84), rgba(4, 6, 10, 0.98)),
          var(--background);
      }

      .card {
        width: min(100%, 32rem);
        border-radius: 24px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)), var(--surface);
        padding: 28px 24px;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.24);
      }

      .eyebrow {
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 12px;
        color: var(--accent);
      }

      h1 {
        margin: 14px 0 0;
        font-size: clamp(2rem, 4vw, 2.6rem);
        line-height: 1.1;
        font-family: "Fraunces", Georgia, serif;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.8;
        color: var(--muted);
      }

      .pill {
        display: inline-flex;
        margin-top: 18px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Connection paused</div>
      <h1>Beside You needs the network to sync safely.</h1>
      <p>The current app avoids caching mutable study state offline. Reconnect, then reopen the app or refresh this screen.</p>
      <div class="pill">No data was overwritten offline.</div>
    </main>
  </body>
  </html>
